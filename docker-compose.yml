services:
  mysql:
    image: mysql:8.0
    container_name: woven_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: woven_investors
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - woven_mysql_data:/var/lib/mysql

volumes:
  woven_mysql_data:
